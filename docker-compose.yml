version: '3.8'

services:
  app:
    build: .
    ports:
      - "127.0.0.1:5000:5000"
    env_file:
      - .env.production  # Add this line
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=contentreworker_prod
      - POSTGRES_USER=${POSTGRES_USER:-contentreworker}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-contentreworker123}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - app-network



volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge