    <!-- maximum-scale removed: blocking pinch-zoom is an a11y issue and Lighthouse penalizes it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#f6f8fc" media="(prefers-color-scheme: light)" />

    <!-- Avatar host warm-up. /api/auth/me returns a googleusercontent URL for
         logged-in users; preconnecting in parallel with HTML parse means the
         TLS handshake is already paid by the time React fires the request. -->
    <link rel="preconnect" href="https://lh3.googleusercontent.com" crossorigin />
    <link rel="dns-prefetch" href="https://lh3.googleusercontent.com" />

    <!-- First-paint critical CSS. Inlined so the browser paints the page
         background and base typography before the main stylesheet downloads —
         eliminates the white flash on slow connections. Stays under 1KB. -->
    <style>
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        font-feature-settings: 'kern';
        background: hsl(216, 33%, 97%);
        color: hsl(222, 47%, 11%);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      #root { min-height: 100vh; }
      @media (prefers-color-scheme: dark) {
        body { background: hsl(240, 10%, 4%); color: hsl(0, 0%, 98%); }
      }
    </style>
